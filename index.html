<!DOCTYPE html>
<!--
  LCI Consultor · Assistente de Vendas Consultiva
  ─────────────────────────────────────────────────
  COMO INSERIR NO GOOGLE SITES:
  1. Abra o Google Sites e vá em Inserir → Incorporar
  2. Escolha "Por URL" e cole o link deste arquivo
     (ou hospede no GitHub Pages / Google Drive público)
  3. Altura recomendada no iframe: 680px ou mais
  4. Se usar "Incorporar código": cole o HTML completo
     em Inserir → Incorporar → Código
  ─────────────────────────────────────────────────
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LCI Consultor · Assistente de Vendas Consultiva</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E60000;--red-dk:#B30000;--red-lt:rgba(230,0,0,0.09);
  --black:#111;--dark:#1A1A1A;
  --white:#FFF;--off:#F8F9FA;
  --gl:#E9ECEF;--gm:#6C757D;--gd:#343A40;
  --green:#1B9A59;--glt:rgba(27,154,89,0.11);
  --blue:#0066CC;--blt:rgba(0,102,204,0.09);
  --yellow:#F59E0B;--ylt:rgba(245,158,11,0.11);
  --fh:'Montserrat',sans-serif;
  --fb:'Open Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* Google Sites iframe: usa altura fixa no wrapper para garantir preenchimento correto */
html{height:100%;overflow-x:hidden}
body{
  font-family:var(--fb);background:var(--off);color:var(--black);
  display:flex;flex-direction:column;
  height:100%;min-height:520px;
  overflow:hidden;max-width:100%;
}

/* ── HEADER ── */
.chat-hdr{background:var(--black);border-bottom:3px solid var(--red);padding:0 18px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ch-left{display:flex;align-items:center;gap:11px}
.ch-av{width:36px;height:36px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;border:2px solid rgba(255,255,255,0.15)}
.ch-info{font-family:var(--fh);font-size:14px;font-weight:800;color:var(--white);line-height:1.2}
.ch-info small{display:block;font-size:10px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:0.04em}
.ch-online{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.45)}
.online-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80}

/* ── PIPELINE BAR ── */
.pip-bar{background:var(--dark);border-bottom:1px solid rgba(255,255,255,0.06);padding:7px 12px;display:flex;gap:4px;align-items:center;overflow-x:auto;scrollbar-width:none;flex-shrink:0;-webkit-overflow-scrolling:touch}
.pip-bar::-webkit-scrollbar{display:none}
.pip-label{font-family:var(--fh);font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;flex-shrink:0;margin-right:3px}
.pip-step{display:flex;align-items:center;gap:3px;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:4px 8px;white-space:nowrap;font-family:var(--fh);font-size:11px;color:rgba(255,255,255,0.55);transition:all 0.15s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.pip-step:hover,.pip-step:active{background:var(--red);border-color:var(--red);color:#fff}
.pip-step .ps-n{font-weight:800;font-size:10px;background:rgba(255,255,255,0.12);border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* Em telas menores, esconde o texto e mostra só emoji+número */
@media(max-width:500px){
  .pip-step .pip-em{display:none}
  .pip-label{display:none}
}

/* ── CHAT AREA ── */
.chat-area{flex:1;overflow-y:auto;padding:18px 14px 6px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:var(--gl);border-radius:3px}

/* ── MESSAGES ── */
.msg-row{display:flex;align-items:flex-end;gap:7px;max-width:100%}
.msg-row.user{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--gl);border:1.5px solid var(--white)}
.msg-av.bot{background:var(--red)}
.msg-bub{max-width:calc(100% - 70px);padding:11px 13px;border-radius:15px 15px 15px 3px;background:var(--white);border:1px solid var(--gl);font-size:13px;line-height:1.55;color:var(--gd);box-shadow:0 2px 6px rgba(0,0,0,0.04)}
.msg-row.user .msg-bub{background:var(--red);color:#fff;border:none;border-radius:15px 15px 3px 15px;box-shadow:0 2px 8px rgba(230,0,0,0.18)}
.msg-time{font-size:10px;color:var(--gm);margin-top:5px;display:block}
.msg-row.user .msg-time{color:rgba(255,255,255,0.55)}

/* ── RESPONSE ELEMENTS ── */
.r-t{font-family:var(--fh);font-weight:800;font-size:14px;color:var(--black);margin-bottom:7px}
.r-s{font-size:12px;color:var(--gm);margin-bottom:9px;font-weight:600}
.r-sec{margin-bottom:11px}.r-sec:last-child{margin-bottom:0}
.r-p{font-size:13px;line-height:1.55;margin-bottom:8px}
.r-p:last-child{margin-bottom:0}

.script-box{background:var(--glt);border:1px solid rgba(27,154,89,0.28);border-left:3px solid var(--green);border-radius:0 7px 7px 0;padding:9px 11px;margin:5px 0;font-size:13px;line-height:1.55}
.script-box .sl{font-family:var(--fh);font-size:10px;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:3px}
.avoid-box{background:var(--red-lt);border:1px solid rgba(230,0,0,0.18);border-left:3px solid var(--red);border-radius:0 7px 7px 0;padding:9px 11px;margin:5px 0;font-size:13px;line-height:1.55}
.avoid-box .al{font-family:var(--fh);font-size:10px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:3px}
.tip-box{background:var(--ylt);border:1px solid rgba(245,158,11,0.28);border-radius:7px;padding:9px 11px;margin:5px 0;display:flex;gap:7px;font-size:13px;line-height:1.55}
.tip-box .tic{flex-shrink:0;font-size:14px;margin-top:1px}
.info-box{background:var(--blt);border:1px solid rgba(0,102,204,0.18);border-radius:7px;padding:9px 11px;margin:5px 0;font-size:13px;line-height:1.55}
.fonte{font-size:10px;color:var(--gm);font-style:italic;margin-top:5px;padding-top:4px;border-top:1px solid var(--gl)}

.r-list{list-style:none;padding:0;margin:6px 0}
.r-list li{font-size:13px;padding-left:15px;position:relative;margin-bottom:4px;line-height:1.5;color:var(--gd)}
.r-list li::before{content:'✓';position:absolute;left:0;color:var(--red);font-weight:900;font-family:var(--fh)}

.r-cols{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:7px 0}
@media(max-width:380px){.r-cols{grid-template-columns:1fr}}
.col-g{background:var(--glt);border:1px solid rgba(27,154,89,0.22);border-radius:7px;padding:8px 10px}
.col-r{background:var(--red-lt);border:1px solid rgba(230,0,0,0.18);border-radius:7px;padding:8px 10px}
.col-lbl{font-family:var(--fh);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;display:block}
.col-g .col-lbl{color:var(--green)}.col-r .col-lbl{color:var(--red)}
.col-list{list-style:none;padding:0}
.col-list li{font-size:11px;color:var(--gd);margin-bottom:3px;padding-left:9px;position:relative}
.col-list li::before{content:'·';position:absolute;left:0;font-weight:900}
.col-g .col-list li::before{color:var(--green)}.col-r .col-list li::before{color:var(--red)}

/* PLAN CARD */
.plan-mini{background:var(--off);border:1px solid var(--gl);border-radius:8px;padding:9px 11px;margin:4px 0;border-left:3px solid var(--red)}
.plan-mini.dest{border-left-color:var(--black);background:#F0FDF4;border-color:rgba(27,154,89,0.25)}
.pm-n{font-family:var(--fh);font-size:13px;font-weight:800;color:var(--black)}
.pm-p{font-family:var(--fh);font-size:14px;font-weight:900;color:var(--red);margin:2px 0}
.pm-f{font-size:11px;color:var(--gm);line-height:1.4}
.pm-u{font-size:11px;color:var(--gd);font-weight:600;margin-top:3px}
.pm-tag{display:inline-block;background:var(--gl);border-radius:10px;font-size:10px;font-weight:700;padding:2px 8px;color:var(--gd);margin-top:3px;font-family:var(--fh)}

/* SPIN */
.spin-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:7px 0}
@media(max-width:440px){.spin-grid{grid-template-columns:1fr}}
.sb{border-radius:7px;padding:8px 10px;border:1px solid}
.sb-s{background:#EFF6FF;border-color:#BFDBFE}.sb-p{background:#FFF7ED;border-color:#FED7AA}
.sb-i{background:#FFF0F0;border-color:#FECACA}.sb-n{background:#ECFDF5;border-color:#A7F3D0}
.sb-l{font-family:var(--fh);font-size:11px;font-weight:800;margin-bottom:4px;display:block}
.sb-s .sb-l{color:#1D4ED8}.sb-p .sb-l{color:#C2410C}.sb-i .sb-l{color:#DC2626}.sb-n .sb-l{color:#059669}
.sb ul{list-style:none;padding:0}.sb li{font-size:11px;color:#374151;margin-bottom:2px;padding-left:9px;position:relative}
.sb li::before{content:'•';position:absolute;left:0;color:var(--gm)}

/* BADGE */
.badge{display:inline-block;border-radius:4px;font-size:10px;font-weight:800;padding:2px 7px;font-family:var(--fh);text-transform:uppercase;letter-spacing:0.04em;margin-right:4px}
.b-r{background:var(--red-lt);color:var(--red)}.b-g{background:var(--glt);color:var(--green)}
.b-b{background:var(--blt);color:var(--blue)}.b-y{background:var(--ylt);color:#92400E}
.b-k{background:var(--gl);color:var(--gd)}

/* ── QUICK REPLIES ── */
.qr-bar{padding:7px 14px;display:flex;gap:5px;flex-wrap:wrap;border-top:1px solid var(--gl);background:var(--white);flex-shrink:0;min-height:38px;align-items:center}
.qr-chip{background:var(--white);border:1.5px solid var(--gl);border-radius:20px;padding:5px 11px;font-family:var(--fh);font-size:11px;font-weight:700;color:var(--gd);cursor:pointer;transition:all 0.13s;white-space:nowrap}
.qr-chip:hover{background:var(--red);border-color:var(--red);color:#fff}

/* ── INPUT BAR ── */
.input-bar{background:var(--white);border-top:1px solid var(--gl);padding:10px 14px;display:flex;gap:7px;align-items:center;flex-shrink:0}
.input-bar input{flex:1;border:1.5px solid var(--gl);border-radius:22px;padding:9px 14px;font-family:var(--fb);font-size:16px;/* 16px evita zoom automático no iOS */color:var(--black);background:var(--off);outline:none;transition:border 0.13s;-webkit-appearance:none;appearance:none}
.input-bar input:focus{border-color:var(--red);background:#fff}
.input-bar input::placeholder{color:var(--gm);font-size:13px}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--red);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.13s;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.send-btn:hover,.send-btn:active{background:var(--red-dk)}
.send-btn svg{width:16px;height:16px;fill:#fff}

/* TYPING */
.typing-row{display:flex;align-items:flex-end;gap:7px}
.typing-bub{background:var(--white);border:1px solid var(--gl);border-radius:15px 15px 15px 3px;padding:11px 14px;display:flex;gap:4px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gm);animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
</style>
</head>
<body>

<div class="chat-hdr">
  <div class="ch-left">
    <div class="ch-av">🤖</div>
    <div class="ch-info">LCI Consultor<small>Assistente de Vendas Consultiva</small></div>
  </div>
  <div class="ch-online"><div class="online-dot"></div>Online</div>
</div>

<div class="pip-bar" id="pipBar">
  <span class="pip-label">Pipeline →</span>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="qr-bar" id="qrBar"></div>

<div class="input-bar">
  <input type="text" id="chatInput" placeholder="Pergunte sobre planos, objeções, técnicas de venda..." autocomplete="off">
  <button class="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
// ── PIPELINE BAR ──
const STAGES=[
  {n:1,e:'🎯',nm:'Prospecção'},{n:2,e:'🤝',nm:'Abordagem'},
  {n:3,e:'🔍',nm:'Sondagem'},{n:4,e:'💡',nm:'Conscientização'},
  {n:5,e:'📦',nm:'Apresentação'},{n:6,e:'🛡️',nm:'Objeções'},
  {n:7,e:'🏆',nm:'Fechamento'},{n:8,e:'⭐',nm:'Pós-venda'},
];
STAGES.forEach(s=>{
  const b=document.createElement('div');
  b.className='pip-step';
  b.innerHTML=`<span class="ps-n">${s.n}</span><span class="pip-em">${s.e}</span> <span class="pip-nm">${s.nm}</span>`;
  b.onclick=()=>sendChip(`Etapa ${s.n}: ${s.nm}`);
  document.getElementById('pipBar').appendChild(b);
});

// ── HELPERS ──
const T=()=>new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
function S(t){return `<span class="script-box"><span class="sl">💬 Diga isso</span>${t}</span>`;}
function AV(t){return `<span class="avoid-box"><span class="al">❌ Evite</span>${t}</span>`;}
function TIP(i,t){return `<div class="tip-box"><span class="tic">${i}</span><div>${t}</div></div>`;}
function INFO(t){return `<div class="info-box">${t}</div>`;}
function PL(n,p,f,u,tg,dest=false){
  return `<div class="plan-mini${dest?' dest':''}">
    <div class="pm-n">${n}</div>
    <div class="pm-p">${p}<span style="font-size:10px;color:var(--gm);font-weight:600"> /mês</span></div>
    <div class="pm-f">${f}</div>
    <div class="pm-u">👤 ${u}</div>
    <span class="pm-tag">${tg}</span>
  </div>`;}

// ── KNOWLEDGE BASE ──
const R = {};

// ── COMANDOS E RESPOSTAS SOCIAIS ──
R.oi = {
html:`<p class="r-p">Oi! 👋 Pronto e por aqui.</p>
<p class="r-p">Me conta — você tá em qual etapa da conversa com o cliente agora? É só digitar ou escolher um tópico.</p>`,
chips:['📋 Pipeline completo','🛡️ Objeções','📦 Planos','🔍 SPIN Selling','📊 Follow-up']
};

R.obrigado = {
html:`<p class="r-p">Boa! 🎯 Fico feliz que tenha ajudado.</p>
<p class="r-p">Se surgir mais alguma dúvida durante a negociação — objeção, plano, follow-up, o que for — é só chamar. Tô aqui!</p>`,
chips:['🏆 Técnica de fechamento','📊 Follow-up','🛡️ Objeções','📋 Pipeline']
};

R.tchau = {
html:`<p class="r-p">Boa sorte na negociação! 🏆</p>
<p class="r-p">Se precisar de apoio em algum momento — mesmo durante a ligação — é só voltar aqui. Vai com tudo!</p>`,
chips:['🏆 Técnica de fechamento','📊 Follow-up']
};

R.welcome = {
html:`<div class="r-t">Oi! Sou o LCI Consultor 🤝</div>
<p class="r-p">Tô aqui pra te ajudar em tempo real — seja durante uma abordagem, na hora de contornar uma objeção ou pra escolher o plano certo pro cliente.</p>
<ul class="r-list">
  <li>Pipeline completo: da Prospecção ao Pós-venda</li>
  <li>Objeções: preço, concorrente, fidelidade e mais 15 outras</li>
  <li>Indicação de plano por perfil do cliente</li>
  <li>Técnicas SPIN, Feel-Felt-Found, ACE, JOLT</li>
  <li>Cadência de follow-up e templates de WhatsApp</li>
  <li>Dúvidas técnicas de Wi-Fi, IP e Mesh</li>
</ul>
${TIP('🎯','<strong>Dica:</strong> manda o texto exato que o cliente falou — adapto a melhor resposta pro contexto real dele!')}`,
chips:['📋 Pipeline completo','🛡️ Objeções','📦 Planos residenciais','📱 Chips/Móvel','🔍 Sondagem SPIN']
};

R.pipeline_overview = {
html:`<div class="r-t">Pipeline de Venda Consultiva — 8 Etapas 🗺️</div>
<p class="r-p">Cada etapa constrói a percepção de valor. Pule uma — qualquer uma — e o cliente vai decidir pelo preço em vez de pelo que você tem de diferente.</p>
<ul class="r-list">
  <li><strong>1. Prospecção</strong> — Defina o ICP antes de abordar</li>
  <li><strong>2. Abordagem</strong> — Regra dos 4×20, rapport</li>
  <li><strong>3. Sondagem</strong> — SPIN Selling: mapeie a dor real</li>
  <li><strong>4. Conscientização</strong> — Valor percebido antes do preço</li>
  <li><strong>5. Apresentação</strong> — 1 plano certo + 1 alternativa</li>
  <li><strong>6. Objeções</strong> — Conduza, não force</li>
  <li><strong>7. Fechamento</strong> — Assuma o sim, pergunte o próximo passo</li>
  <li><strong>8. Pós-venda</strong> — Fidelização e indicação</li>
</ul>
${TIP('⚡','<strong>Lei de Ouro:</strong> cada etapa constrói a percepção de valor que justifica o preço. Nenhuma é opcional.')}`,
chips:['1️⃣ Prospecção','3️⃣ Sondagem SPIN','6️⃣ Objeções','7️⃣ Fechamento']
};

R.prospeccao = {
html:`<div class="r-t">🎯 Etapa 1 — Prospecção / ICP</div>
<p class="r-s">Prospectar sem ICP é atirar pra todo lado. Defina quem é o cliente ideal <em>antes</em> de abordar.</p>
<div class="r-cols">
  <div class="col-g">
    <span class="col-lbl">🏠 Residencial</span>
    <ul class="col-list">
      <li>Família com crianças em casa</li>
      <li>Home office recorrente</li>
      <li>Gamer competitivo</li>
      <li>Cinéfilo / multi-streaming</li>
      <li>Idosos com comunicação digital</li>
    </ul>
  </div>
  <div class="col-g">
    <span class="col-lbl">🏢 Empresarial</span>
    <ul class="col-list">
      <li>MEI e escritório pequeno</li>
      <li>Câmeras de segurança IP</li>
      <li>ERP e backup em nuvem</li>
      <li>Equipe de campo (chip móvel)</li>
      <li>Hospitais e clínicas</li>
    </ul>
  </div>
</div>
${TIP('💡','O ICP é construído a partir dos seus <strong>melhores clientes ativos</strong> — quem nunca cancelou, indicou outros e paga em dia. Esse é o perfil que você replica.')}
<div class="fonte">Ref: ICP — Salesforce / meetime.com.br</div>`,
chips:['🤝 Etapa 2: Abordagem','🔍 Etapa 3: Sondagem','📦 Planos residenciais','🏢 Planos empresariais']
};

R.abordagem = {
html:`<div class="r-t">🤝 Etapa 2 — Abordagem e Rapport</div>
<p class="r-p">Você tem 20 segundos. Os primeiros 20 gestos, 20 cm de distância, 20 palavras — tudo isso define se o cliente vai ouvir ou fechar a porta.</p>
<div class="avoid-box"><span class="al">❌ Evite</span>"Olá, somos a LCI Telecom e temos os melhores planos do mercado, posso apresentar?"</div>
<div class="script-box"><span class="sl">✅ Use isso</span>"<em>[Nome], você mora no bairro [X]? Nossa rede é a que tem maior cobertura ali agora. Como tem sido a experiência com o provedor atual?</em>"</div>
<div class="r-cols">
  <div class="col-g">
    <span class="col-lbl">✅ Faça</span>
    <ul class="col-list">
      <li>Comece pela dor do cliente</li>
      <li>Use prova social local</li>
      <li>Faça uma pergunta aberta</li>
      <li>Demonstre que conhece o contexto</li>
    </ul>
  </div>
  <div class="col-r">
    <span class="col-lbl">❌ Evite</span>
    <ul class="col-list">
      <li>Falar de preço no 1º contato</li>
      <li>Listar vantagens antes de entender</li>
      <li>"Posso apresentar a empresa?"</li>
      <li>Pitch longo nos primeiros segundos</li>
    </ul>
  </div>
</div>
${TIP('🧠','Rapport não é simpatia forçada — é construção de confiança. A decisão de "ouvir ou fechar" ocorre nos primeiros 20 segundos.')}`,
chips:['🔍 Etapa 3: Sondagem','🛡️ Objeção apareceu','📦 Planos residenciais']
};

R.sondagem = {
html:`<div class="r-t">🔍 Etapa 3 — Sondagem SPIN</div>
<p class="r-p">Quem faz as perguntas certas controla a conversa — sem parecer controlador. O cliente que verbaliza a própria necessidade se convence sozinho. Isso foi validado em 35.000 vendas reais.</p>
<div class="spin-grid">
  <div class="sb sb-s"><span class="sb-l">S — Situação</span><ul>
    <li>"Quantas pessoas usam a internet?"</li>
    <li>"Trabalha de casa com frequência?"</li>
    <li>"Qual provedor usa hoje?"</li>
  </ul></div>
  <div class="sb sb-p"><span class="sb-l">P — Problema</span><ul>
    <li>"A internet já travou em reunião?"</li>
    <li>"Sinal chega bem em todos os cômodos?"</li>
    <li>"Netflix já ficou com carregando?"</li>
  </ul></div>
  <div class="sb sb-i"><span class="sb-l">I — Implicação</span><ul>
    <li>"Quando trava, o que acontece com o cliente?"</li>
    <li>"Quanto isso já custou em produtividade?"</li>
    <li>"Seu filho estuda online — e quando cai?"</li>
  </ul></div>
  <div class="sb sb-n"><span class="sb-l">N — Necessidade</span><ul>
    <li>"Se resolver, o que muda no seu dia?"</li>
    <li>"O que seria ideal no plano perfeito?"</li>
    <li>"Estabilidade ou velocidade é mais crítico?"</li>
  </ul></div>
</div>
${TIP('🧠','<strong>Regra:</strong> máx. 2 perguntas seguidas antes de comentar algo. Não é interrogatório — é diagnóstico. Quem ouve mais, fecha mais.')}
<div class="fonte">Ref: Neil Rackham — SPIN Selling (1988), 35.000 vendas, 23 países</div>`,
chips:['💡 Etapa 4: Conscientização','📦 Etapa 5: Apresentação','🛡️ Objeção apareceu']
};

R.conscientizacao = {
html:`<div class="r-t">💡 Etapa 4 — Conscientização</div>
<p class="r-p">Apresentar o plano antes dessa etapa é o erro mais caro da venda. O cliente precisa sentir a dor antes de ver a solução — senão qualquer preço vai parecer alto.</p>
<div class="info-box"><strong>Fórmula de Kotler:</strong><br>Valor Percebido = Benefícios Percebidos − Custos Percebidos<br>Se o cliente não vê os benefícios antes do preço, qualquer número parece caro.</div>
<div class="r-p">🗣️ <em>Cliente:</em> "Minha internet é ok... só cai de vez em quando."</div>
<div class="script-box"><span class="sl">✅ Responda com implicação</span>"Ok. Mas você me disse que a reunião travou semana passada e o Netflix trava à noite. 'De vez em quando' tá custando quanto de estresse e produtividade?"</div>
<div class="r-p" style="margin-top:4px">🗣️ <em>Cliente:</em> "Pois é... quando você coloca assim..."</div>
${TIP('⚠️','<strong>Nunca pule essa etapa.</strong> Sem conscientização, o cliente compara preço com concorrente — não valor com o problema dele.')}
<div class="fonte">Ref: Philip Kotler (Princípios do Marketing) · JOLT Effect, Matt Dixon 2022</div>`,
chips:['📦 Etapa 5: Apresentação','🛡️ Objeção apareceu','📦 Planos residenciais']
};

R.apresentacao = {
html:`<div class="r-t">📦 Etapa 5 — Apresentação</div>
<p class="r-p">Mais de 3 opções paralisa a decisão. Apresente <strong>1 plano certo</strong> baseado na sondagem + <strong>1 alternativa</strong> — nunca o catálogo inteiro.</p>
<div class="script-box"><span class="sl">✅ Modelo de apresentação</span>"Com base no que você me contou — home office, 2 filhos no Netflix e você jogando online — o plano certo é o <strong>Combo Nitro 1000 Mega a R$ 249,90</strong>. Ele comporta todo mundo sem degradar."</div>
<div class="r-p">Se pedir algo mais em conta:</div>
<div class="script-box"><span class="sl">✅ Alternativa com âncora</span>"O Combo Entretenimento 600 Mega a R$ 179,90 funciona — mas em horário de pico com todo mundo online você vai sentir. O Nitro foi feito pra esse perfil."</div>
<div class="r-cols">
  <div class="col-g">
    <span class="col-lbl">✅ Faça</span>
    <ul class="col-list">
      <li>Conecte cada vantagem à dor da sondagem</li>
      <li>1 plano certo + 1 alternativa apenas</li>
      <li>Linguagem do cliente, não técnica</li>
    </ul>
  </div>
  <div class="col-r">
    <span class="col-lbl">❌ Evite</span>
    <ul class="col-list">
      <li>Listar todos os planos disponíveis</li>
      <li>Revelar preço antes de mostrar valor</li>
      <li>Falar velocidade sem contextualizar uso</li>
    </ul>
  </div>
</div>
${TIP('📌','Indique sempre o plano que resolve a necessidade descoberta na sondagem — não o mais caro. Cliente no plano certo vira indicação e upgrade futuro.')}`,
chips:['🛡️ Objeções','7️⃣ Fechamento','📦 Planos residenciais','🏢 Planos empresariais']
};

R.objecoes = {
html:`<div class="r-t">🛡️ Etapa 6 — Contorno de Objeções</div>
<p class="r-s">Objeção não é rejeição — é pedido de segurança. 56% das perdas vêm de medo de errar (FOMU), não de preferência pelo concorrente.</p>
<ul class="r-list">
  <li><strong>💸 "Tá caro"</strong> — ACE + reframe do custo real</li>
  <li><strong>⏳ "Vou pensar"</strong> — JOLT: reduza o FOMU</li>
  <li><strong>🔄 "Já uso concorrente"</strong> — Descubra a dor oculta</li>
  <li><strong>🔄 "Concorrente é mais barato"</strong> — Diferenciais LCI</li>
  <li><strong>📋 "Não quero contrato/fidelidade"</strong> — Compromisso mútuo</li>
  <li><strong>✅ "Estou satisfeito"</strong> — SPIN de implicação</li>
  <li><strong>❌ "Não estou interessado"</strong> — Uma pergunta antes de desligar</li>
  <li><strong>🏃 "Estou ocupado"</strong> — Agende com duas opções</li>
  <li><strong>📧 "Manda por e-mail"</strong> — Qualifique antes de enviar</li>
  <li><strong>📅 "Ligue no próximo trimestre"</strong> — Descubra o motivo real</li>
  <li><strong>💰 "Sem orçamento"</strong> — ROI + janela de revisão</li>
  <li><strong>📊 "Não vejo retorno"</strong> — Calcule o custo oculto</li>
  <li><strong>⭐ "Vi reclamação"</strong> — Responda com transparência</li>
  <li><strong>📵 "Bip bip bip"</strong> — WhatsApp inteligente pós-desligada</li>
</ul>
${TIP('🛡️','<strong>Contorno ≠ Convencimento.</strong> Objeção persistente = etapas 3 ou 4 foram puladas. Volte ao diagnóstico.')}
${TIP('🎯','Manda aqui o texto exato que o cliente falou — adapto a melhor resposta pro contexto real!')}
<div class="fonte">Ref: The JOLT Effect, Matt Dixon (2022) — 2,5 milhões de calls analisadas</div>`,
chips:['💸 "Tá caro"','⏳ "Vou pensar"','🔄 Já usa concorrente','❌ "Não me interessa"','🏃 "Estou ocupado"','📧 "Manda por e-mail"','🏆 7 Passos para objeções']
};

R.obj_preco = {
html:`<div class="r-t">💸 "Tá caro" — a mais clássica</div>
<p class="r-p">Quase sempre não é sobre preço — é porque o valor ainda não ficou claro. Antes de rebater, identifique o que ele está comparando.</p>
${S('"Entendo, preço é um fator importante. Mas me diz — caro comparado com o quê? Com o que você paga hoje somando o plano atual mais os extras quando estoura?"')}
${S('"Muitos clientes <strong>sentiram</strong> o mesmo no início. Quando compararam o total — plano + chip + o custo das quedas — <strong>descobriram</strong> que a LCI saía igual ou abaixo do que pagavam antes."')}
${S('"Quanto custa quando a internet cai durante uma reunião importante? Esse é o custo real que a gente tá eliminando."')}
${AV('"Mas a LCI oferece qualidade!" — Argumentar direto no preço sem perguntar o que ele está comparando é um erro que piora a situação.')}
${TIP('🧠','Se o cliente não passou pela Conscientização (etapa 4), qualquer preço vai parecer caro. <strong>Volte ao diagnóstico</strong> antes de justificar o valor.')}
<div class="fonte">Ref: ACE Framework (saleshive.com) · Feel-Felt-Found (changingminds.org)</div>`,
chips:['⏳ "Vou pensar"','📦 Ver planos em conta','🔄 Concorrente mais barato','💡 Voltar à conscientização']
};

R.obj_pensar = {
html:`<div class="r-t">⏳ "Vou pensar" — medo disfarçado de reflexão</div>
<p class="r-p">56% das perdas por "vou pensar" são por FOMU — medo de errar a decisão, não por preferência do concorrente. Não aumente a pressão — reduza o risco percebido.</p>
<div class="script-box"><span class="sl">✅ Identifique o medo real</span>"Claro, sem problema. Me diz: o que falta pra você se sentir seguro pra decidir hoje?"</div>
<div class="script-box"><span class="sl">✅ Reduza a percepção de risco</span>"A instalação é grátis, o Clube de Benefícios entra no primeiro mês e nosso suporte funciona até meia-noite. Você não assume nenhum risco."</div>
<div class="script-box"><span class="sl">✅ Urgência real (não forçada)</span>"Só um detalhe: os slots de instalação no seu bairro essa semana estão acabando. Garantindo hoje, agendamos amanhã."</div>
<div class="avoid-box"><span class="al">❌ Evite</span>"Me avisa quando decidir." — Perde urgência e entrega o controle para o cliente.</div>
${TIP('🛡️','56% das perdas por "vou pensar" são por FOMU — medo de fazer a escolha errada. Reduza o risco percebido, não aumente a pressão.')}
<div class="fonte">Ref: The JOLT Effect, Matt Dixon (2022)</div>`,
chips:['💸 "Tá caro"','🔄 Concorrente mais barato','🏆 Técnica de fechamento','📊 Follow-up: cliente sumiu']
};

R.obj_concorrente = {
html:`<div class="r-t">🔄 "Concorrente é mais barato" — muda o terreno</div>
<p class="r-p">Não discuta preço — você perde nesse campo. Mude o critério da comparação pro que realmente importa no dia a dia: suporte, estabilidade, rede própria.</p>
<div class="script-box"><span class="sl">✅ Reframe: custo x qualidade</span>"Pode ser. Mas barato que cai não é barato. Você me disse que a reunião travou semana passada — qual é o custo real de cada interrupção?"</div>
<div class="script-box"><span class="sl">✅ Diferenciais LCI</span>"A LCI tem rede própria, suporte local até meia-noite e Clube de Benefícios. Outros provedores terceirizam a manutenção — quando cai, a fila de espera é longa."</div>
<div class="script-box"><span class="sl">✅ Feel-Felt-Found</span>"Muitos clientes <strong>sentiram</strong> o mesmo. Foram pro concorrente, <strong>sentiram</strong> as quedas e o suporte demorado e <strong>descobriram</strong> que economizaram no plano mas perderam muito mais."</div>
${TIP('💡','Nunca fale mal do concorrente diretamente. Deixe o cliente chegar à conclusão sozinho com perguntas de implicação.')}`,
chips:['💸 "Tá caro"','📦 Planos residenciais','🏆 Fechamento']
};

R.obj_fidelidade = {
html:`<div class="r-t">📋 "Não quero fidelidade" — autonomia, não objeção</div>
<p class="r-p">O cliente quer sentir que está no controle. Mostre que a fidelidade existe por ele, não contra ele.</p>
<div class="script-box"><span class="sl">✅ Resposta direta e transparente</span>"Entendo o receio. A fidelidade existe porque a gente banca a <strong>instalação grátis</strong> e o <strong>Clube de Benefícios</strong> com desconto desde o primeiro mês. É compromisso mútuo — garantimos que você fica satisfeito."</div>
<div class="script-box"><span class="sl">✅ O que o cliente ganha</span>"No período de fidelidade você tem: instalação grátis, suporte premium, benefícios do Clube LCI e upgrade de velocidade ao final. Não é prisão — é parceria."</div>
<div class="script-box"><span class="sl">✅ Reduza o medo com garantia</span>"Se em qualquer momento você tiver um problema de qualidade que a gente não consiga resolver, a gente não vai te segurar. Nosso compromisso é com a experiência."</div>
${TIP('🧠','Se o cliente ainda resistir, pergunte: "O que especificamente te preocupa na fidelidade?" — a resposta revela o medo real por trás da objeção.')}`,
chips:['💸 "Tá caro"','🏆 Fechamento','📊 Follow-up']
};

R.obj_satisfeito = {
html:`<div class="r-t">✅ "Estou satisfeito" — ou será que não?</div>
<p class="r-p">Satisfação declarada raramente é satisfação real. 95% dos insatisfeitos não reclamam — simplesmente vão embora um dia. Use o SPIN pra revelar a dor que ele normalizou.</p>
<div class="script-box"><span class="sl">✅ Problema: plante a dúvida</span>"Que bom! Mas me conta — tem alguma hora do dia que a velocidade cai, ou algum cômodo que o sinal não chega direito?"</div>
<div class="script-box"><span class="sl">✅ Implicação: amplifique</span>"E quando cai em horário de pico — tipo à noite com todo mundo em casa — o que costuma acontecer?"</div>
<div class="script-box"><span class="sl">✅ Necessidade: faça verbalizar</span>"Se você tivesse uma internet que não cai nunca, com suporte local quando precisar, o que mudaria no dia a dia da sua família?"</div>
${TIP('💡','<strong>Satisfação implícita ≠ ausência de dor.</strong> Kotler: 95% dos insatisfeitos não reclamam — apenas vão embora. Use o SPIN para revelar a dor que o cliente normalizou.')}
<div class="fonte">Ref: Philip Kotler — Princípios do Marketing</div>`,
chips:['🔍 SPIN Selling completo','💡 Conscientização','📦 Planos residenciais']
};

R.fechamento = {
html:`<div class="r-t">🏆 Etapa 7 — Fechamento</div>
<p class="r-p">Fechamento é a consequência natural de um ciclo bem executado — nunca de pressão. Se chegou aqui com diagnóstico e valor construídos, o "sim" já está no caminho.</p>
<div class="script-box"><span class="sl">✅ Fechamento Alternativo (pressupõe o sim)</span>"Confirma o endereço — prefere instalação de manhã ou à tarde?"</div>
<div class="script-box"><span class="sl">✅ Fechamento com Concessão</span>"Fechando hoje, isento a taxa de instalação e te coloco na agenda de amanhã."</div>
<div class="script-box"><span class="sl">✅ Assumir o avanço</span>"Vou gerar a proposta agora — você consegue confirmar até o fim do dia?"</div>
<div class="r-cols">
  <div class="col-g">
    <span class="col-lbl">✅ Faça</span>
    <ul class="col-list">
      <li>Assuma o sim, pergunte o próximo passo</li>
      <li>Duas opções que conduzem ao sim</li>
      <li>Mostre urgência real, não fabricada</li>
    </ul>
  </div>
  <div class="col-r">
    <span class="col-lbl">❌ Evite</span>
    <ul class="col-list">
      <li>"E aí, vai fechar?" — abre espaço pro não</li>
      <li>"Me avisa quando decidir" — perde urgência</li>
      <li>"O que você acha?" — devolve a dúvida</li>
    </ul>
  </div>
</div>
${TIP('🏆','<strong>Fechamento alternativo:</strong> "Manhã ou tarde?" — ambas pressupõem o fechamento. O cliente sente autonomia, não pressão.')}
<div class="fonte">Ref: Exact Sales — 30% conversão consultiva vs. 6% média nacional</div>`,
chips:['⭐ Pós-venda','📊 Follow-up','🛡️ Ainda tem objeção']
};

R.posvenda = {
html:`<div class="r-t">⭐ Etapa 8 — Pós-venda</div>
<p class="r-p">O pós-venda bem feito gera o próximo ciclo de vendas automaticamente. Uma indicação converte 3× mais que prospecção fria — e custa quase zero.</p>
<div class="script-box"><span class="sl">📅 Dia da instalação</span>"Oi [Nome]! Tudo certinho com a instalação? Qualquer dúvida sobre o roteador ou os apps, pode me chamar aqui 😊"</div>
<div class="script-box"><span class="sl">📅 30 dias após — check-in real</span>"[Nome], faz um mês que você tá com a LCI — como tá sendo a experiência? Alguma coisa que posso ajudar a ajustar?"</div>
<div class="script-box"><span class="sl">🤝 Abertura para indicação (no check-in)</span>"Você conhece alguém que paga caro por uma internet que cai direto? Tenho um benefício especial pra indicações do seu bairro."</div>
<div class="script-box"><span class="sl">♻️ Reativação de cliente perdido</span>"[Nome], vi que você foi pra outro provedor. Sei que não foi o ideal. Se algum dia quiser retornar, tenho uma condição especial esperando. Sem pressão 🙂"</div>
${TIP('💡','Kotler: 95% dos insatisfeitos não reclamam — vão embora e contaminam 13 outros. Reativar custa 5–7× menos que conquistar novo.')}`,
chips:['📊 Cadência de follow-up','🎯 Prospecção','📦 Upgrade de plano']
};

R.spin_detail = {

R.ace_framework = {
html:`<div class="r-t">🔷 ACE Framework — Contorno de Objeções</div>
<p class="r-s">Acknowledge · Clarify · Engage — 3 passos para transformar objeção em conversa.</p>
<div class="script-box"><span class="sl">A — Acknowledge (Reconheça)</span>Valide a objeção sem concordar ou contrariar.<br>"<em>Entendo, preço é sempre um fator importante a considerar.</em>"</div>
<div class="script-box"><span class="sl">C — Clarify (Clarifique)</span>Identifique a objeção real — ela raramente é o que foi dito.<br>"<em>Caro comparado com o quê? Com o que você paga hoje, somando plano + extras quando estoura?</em>"</div>
<div class="script-box"><span class="sl">E — Engage (Engaje)</span>Responda com contexto, dados ou prova social.<br>"<em>Outros clientes no mesmo perfil perceberam que a LCI saía igual ou abaixo — com fibra dedicada e sem surpresas na fatura.</em>"</div>
${TIP('🔷','ACE mantém a conversa fluindo sem respostas prontas ou scripts engessados. O C (Clarify) é o mais poderoso — descubra a objeção real antes de responder.')}
<div class="fonte">Ref: saleshive.com/blog/sales-objection-handling · yoodli.ai/blog/objection-handling</div>`,
chips:['🫱 Feel-Felt-Found','⚡ JOLT Effect','💸 Objeção de preço','⏳ "Vou pensar"']
};

R.jolt = {
html:`<div class="r-t">⚡ JOLT Effect — Vencendo a Indecisão</div>
<p class="r-s">Matt Dixon, 2022 — 2,5 milhões de calls analisadas. 56% das perdas vêm de FOMU, não de preferência pelo concorrente.</p>
<div class="info-box">
  <strong>FOMU = Fear of Messing Up (Medo de Errar)</strong><br>
  O cliente não fecha porque tem medo de tomar a decisão errada, não porque preferiu o concorrente.
</div>
<ul class="r-list">
  <li><strong>J — Judge the indecision:</strong> identifique se é FOMU ou preferência real</li>
  <li><strong>O — Offer a recommendation:</strong> reduza opções, ofereça a escolha certa</li>
  <li><strong>L — Limit the exploration:</strong> não deixe o cliente "pesquisar mais"</li>
  <li><strong>T — Take risk off the table:</strong> ofereça garantias e reduza o risco percebido</li>
</ul>
<div class="script-box"><span class="sl">✅ Aplicado na LCI</span>"Percebo que você ainda está avaliando. Me diz — o que falta pra você se sentir seguro nessa decisão?" [Depois:] "A instalação é grátis, o suporte funciona até meia-noite e você tem o Clube de Benefícios desde o 1º mês. O risco é zero da sua parte."</div>
${TIP('🧠','Aumentar urgência com FOMU piora a situação. A chave é <strong>reduzir a percepção de risco</strong>, não pressionar mais.')}
<div class="fonte">Ref: Matt Dixon — The JOLT Effect (2022) · thesaasbarometer.substack.com</div>`,
chips:['⏳ "Vou pensar"','🔷 ACE Framework','🫱 Feel-Felt-Found','🏆 Fechamento']
};

R.sete_passos = {
html:`<div class="r-t">🏆 7 Passos para Superar Objeções</div>
<p class="r-s">Processo estruturado — funciona pra qualquer resistência.</p>
<ul class="r-list">
  <li><strong>1. Ouça com atenção total</strong> — Deixe o cliente terminar. Quem interrompe perde informação e quebra o rapport.</li>
  <li><strong>2. Valide sem concordar</strong> — "Entendo o que você quer dizer..." — validar ≠ concordar. Cria segurança psicológica.</li>
  <li><strong>3. Identifique a objeção real</strong> — "Tá caro" raramente é sobre preço. Pergunte: "Caro em relação ao quê?"</li>
  <li><strong>4. Responda com contexto</strong> — Use dados, prova social e diferenciais LCI conectados à dor real da sondagem.</li>
  <li><strong>5. Confirme a resolução</strong> — "Isso esclarece o que você precisava?" Não assuma que a objeção sumiu.</li>
  <li><strong>6. Redirecione pro fechamento</strong> — "O problema era X, resolvemos. O que falta pra confirmar?"</li>
  <li><strong>7. Se persistir, volte ao diagnóstico</strong> — Objeção em cascata = valor não foi construído. Volte ao SPIN, não empurre mais argumentos.</li>
</ul>
${TIP('🧠','<strong>Sinal de alerta:</strong> quando surgem 3 objeções seguidas, geralmente significa que as etapas 3 (Sondagem) ou 4 (Conscientização) foram puladas.')}
<div class="fonte">Ref: Tutorial Venda Consultiva LCI · SPIN Selling · JOLT Effect</div>`,
chips:['🔷 ACE Framework','⚡ JOLT Effect','🫱 Feel-Felt-Found','🔍 SPIN Selling']
};

// ── INTENT DETECTION ──
function detect(msg) {
  const t = msg.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g,'');
  const has = (...ws) => ws.some(w => t.includes(w));
  const exact = t.trim();

  // ── Comandos básicos (prioridade máxima) ──
  if(has('voltar ao inicio','voltar pro inicio','comecar de novo','recomecar tudo','ir pro menu','tela inicial','pagina inicial')) return 'welcome';
  if(exact==='inicio'||exact==='menu'||exact==='recomecar'||exact==='comecar'||exact==='home'||exact==='reiniciar') return 'welcome';

  // ── Saudações ──
  if(exact==='oi'||exact==='ola'||exact==='ei'||exact==='e ai'||exact==='iae'||exact==='opa') return 'oi';
  if(has('bom dia','boa tarde','boa noite','tudo bem','tudo certo','como voce vai','como vc vai','oi tudo','ola tudo','oi, tudo')) return 'oi';

  // ── Agradecimentos e confirmações ──
  if(has('obrigado','obrigada','muito obrigado','muito obrigada','agradeco','agradecida')) return 'obrigado';
  if((exact==='valeu'||exact==='otimo'||exact==='perfeito'||exact==='show'||exact==='legal'||exact==='massa'||exact==='incrivel'||exact==='excelente'||exact==='entendi'||exact==='ok')) return 'obrigado';
  if(exact.length<20 && has('valeu demais','foi otimo','foi util','me ajudou','top demais','gostei muito')) return 'obrigado';

  // ── Despedidas ──
  if(has('tchau','ate mais','ate logo','xau','bye','de nada ate')) return 'tchau';

  // ── Perguntas vagas sobre objeções → pede o texto do cliente primeiro ──
  // Requer palavras interrogativas/vagas (não captura chips como "🛡️ Objeções")
  if(has('como lidar com','como tratar objecao','como responder objecao','o que falo quando','o que fazer quando','tenho uma objecao','o cliente tem objecao','me ajuda com objecao','dica de objecao','preciso contornar','como contornar essa')) return 'obj_vaga';

  // ── Objeções específicas (antes do pipeline geral) ──
  if(has('ta caro','esta caro','muito caro','valor alto','caro demais','sai caro','preco alto','nao tenho dinheiro','custa muito','ficou caro','achou caro','achou muito caro')) return 'obj_preco';
  if(has('vou pensar','preciso pensar','deixa eu ver','depois eu','nao sei ainda','vou decidir','pensar um pouco','preciso avaliar','deixa pensar','me da um tempo','pensar melhor','dar uma pensada')) return 'obj_pensar';
  if(has('desligou','bip bip','chamada encerrada','ele desligou','ela desligou','caiu a chamada','desligaram','cortou a ligacao')) return 'obj_desligou';
  if(has('caixa postal','nao atendeu','nao pegou telefone','nao respondeu o telefone','voicemail','nao atendem o telefone')) return 'obj_caixa_postal';
  if(has('ja uso o','ja sou cliente','ja somos clientes','somos clientes de','ja tenho contrato com','cliente do concorrente','ja assinou com outro','ja usa concorrente','ja usa o concorrente')) return 'obj_usa_concorrente';
  if(has('concorrente','outro provedor','vivo fibra','claro fibra','net fibra','oi fibra','mais barato la','la e mais barato','a concorrencia cobrou','o concorrente cobrou')) return 'obj_concorrente';
  if(has('nao quero fidelidade','sem fidelidade','odio fidelidade','nao gosto de fidelidade','nao quero me prender em')) return 'obj_fidelidade';
  if(has('contrato longo','nao quero contrato','periodo longo','fidelizacao')) return 'obj_contrato_longo';
  if(has('fidelidade','multa rescisao','preso no contrato')) return 'obj_fidelidade';
  if(has('estou satisfeito','estou bem com','funciona bem','nao preciso mudar','to satisfeito','ta bom pra mim','nao tenho reclamacao')) return 'obj_satisfeito';
  if(has('ja tenho internet','ja uso internet')) return 'obj_satisfeito';
  if(has('nao estou interessado','nao tenho interesse','nao me interessa','sem interesse','nao tenho necessidade de')) return 'obj_nao_interessado';
  if(has('estou ocupado','to ocupado','sem tempo agora','ocupado agora','nao posso falar agora','momento ruim pra falar')) return 'obj_ocupado';
  if(has('como voce conseguiu meu','como obteve meu contato','de onde tirou meu numero','de onde veio meu contato','quem passou meu numero')) return 'obj_como_obteve';
  if(has('nunca ouvi falar','nao conheco essa empresa','nao sei quem e a lci','primeira vez que ouvo','quem e a lci','nao conheco a lci')) return 'obj_nunca_ouvi';
  if(has('parece complicado','muito complicado','complexo demais','da trabalho mudar','dor de cabeca mudar','vai complicar','trabalhoso mudar')) return 'obj_complicado';

function getResponse(msg) {
  const key = detect(msg);
  return R[key] || R.fallback;
}

// ── CHAT ENGINE ──
function tstamp(){ return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }

function renderMsg(role, html) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'msg-row' + (role === 'user' ? ' user' : '');

  const av = document.createElement('div');
  av.className = 'msg-av' + (role === 'bot' ? ' bot' : '');
  av.textContent = role === 'bot' ? '🤖' : '👤';

  const bub = document.createElement('div');
  bub.className = 'msg-bub';
  if (role === 'user') {
    bub.textContent = html;
    bub.innerHTML += `<span class="msg-time">${tstamp()}</span>`;
  } else {
    bub.innerHTML = html + `<span class="msg-time">${tstamp()}</span>`;
  }

  row.appendChild(av);
  row.appendChild(bub);
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typingEl';
  row.innerHTML = `<div class="msg-av bot">🤖</div><div class="typing-bub"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() { const el = document.getElementById('typingEl'); if(el) el.remove(); }

function setChips(chips) {
  const bar = document.getElementById('qrBar');
  bar.innerHTML = '';
  (chips || []).forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'qr-chip';
    btn.textContent = c;
    btn.onclick = () => sendChip(c);
    bar.appendChild(btn);
  });
}

function sendChip(text) {
  document.getElementById('chatInput').value = text;
  sendMessage();
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  setChips([]);

  renderMsg('user', text);
  showTyping();

  setTimeout(() => {
    hideTyping();
    const res = getResponse(text);
    renderMsg('bot', res.html);
    setChips(res.chips || []);
  }, 500 + Math.random() * 350);
}

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

// ── INIT ──
setTimeout(() => {
  renderMsg('bot', R.welcome.html);
  setChips(R.welcome.chips);
}, 350);
</script>
